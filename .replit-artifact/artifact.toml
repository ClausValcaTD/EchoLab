kind = "web"
previewPath = "/"
title = "EchoLab v2"
version = "1.0.0"
id = "artifacts/echolab"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25315

[services.development]
run = "pnpm --filter @workspace/echolab run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/echolab", "run", "build" ]
serve = "static"
publicDir = "artifacts/echolab/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25315"
BASE_PATH = "/"
